<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#10B981" opacity="0.1"/>
  
  <!-- Chain Links -->
  <g stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- First Link -->
    <rect x="30" y="85" width="30" height="30" rx="5"/>
    <!-- Second Link -->
    <rect x="70" y="85" width="30" height="30" rx="5"/>
    <!-- Third Link -->
    <rect x="110" y="85" width="30" height="30" rx="5"/>
    <!-- Fourth Link -->
    <rect x="150" y="85" width="30" height="30" rx="5"/>
    
    <!-- Connection Lines -->
    <line x1="60" y1="100" x2="70" y2="100"/>
    <line x1="100" y1="100" x2="110" y2="100"/>
    <line x1="140" y1="100" x2="150" y2="100"/>
  </g>
  
  <!-- Coin Symbol Inside Links -->
  <g fill="#10B981">
    <circle cx="45" cy="100" r="8"/>
    <circle cx="85" cy="100" r="8"/>
    <circle cx="125" cy="100" r="8"/>
    <circle cx="165" cy="100" r="8"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#10B981">
    ThriftChain
  </text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#059669">
    Second-hand Marketplace
  </text>
</svg>
